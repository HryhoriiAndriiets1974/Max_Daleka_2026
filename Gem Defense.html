<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Gem Defense</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
}

canvas{
    display:block;
    background:#111;
}

#score,#healCounter,#modeText,#controlsHelp{
    position:absolute;
    z-index:5;
    display:none;
    font-size:28px;
}

#score{top:20px; left:20px;}

#healCounter{
    top:60px;
    left:20px;
    color:lime;
}

#modeText{
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:yellow;
}

#controlsHelp{
    left:20px;
    bottom:20px;
    font-size:22px;
    white-space:pre-line;
    color:cyan;
}

.menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    z-index:10;
}

h1{
    color:cyan;
    font-size:70px;
    text-shadow:0 0 20px purple;
}

button{
    padding:15px 40px;
    font-size:28px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* ІМ'Я В МЕНЮ */
#authorName{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    font-size:22px;
    font-family:Arial;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="score">Очки: 0</div>
<div id="healCounter">До ❤️: 50</div>
<div id="modeText"></div>

<div id="controlsHelp">Управлениє
W A S D
↑ ← ↓ →</div>

<!-- ГОЛОВНЕ МЕНЮ -->
<div id="mainMenu" class="menu">
    <h1>Gem Defense</h1>

    <button onclick="showDifficulty()">Грати</button>

    <!-- ІМ'Я ЗНИЗУ ЗЛІВА -->
    <div id="authorName">By Danil</div>
</div>

<div id="difficultyMenu" class="menu" style="display:none;">
    <h1>Складність</h1>
    <button onclick="startGame('normal')">Нормальний</button>
    <button onclick="startGame('crazy')">Неадекватний</button>
    <button onclick="backToDifficultyMenu()">Назад</button>
</div>

<div id="gameOverMenu" class="menu" style="display:none;">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">Почати заново</button>
    <button onclick="backToMenu()">В меню</button>
</div>

<canvas id="game"></canvas>

<script>
</script>

</body>
</html>
